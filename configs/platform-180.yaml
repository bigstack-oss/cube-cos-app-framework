        - direction: "ingress"
          etherType: "IPv4"
          protocol: "udp"
          cidr: "0.0.0.0/0"
          portRange:
            min: 30000
            max: 32767
  flavor:
    name: "appfw.large"
  ssh:
    user: "ubuntu"
    port: 22
  image:
    name: "rke2-1.30.6"

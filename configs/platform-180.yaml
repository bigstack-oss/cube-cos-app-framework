          etherType: "IPv4"
          protocol: "tcp"
          cidr: "0.0.0.0/0"
          portRange:
            min: 22
            max: 22
        - direction: "ingress"
          etherType: "IPv4"
          protocol: "tcp"
          cidr: "0.0.0.0/0"
          portRange:
            min: 80
